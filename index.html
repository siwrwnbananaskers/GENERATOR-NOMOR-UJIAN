<body class="bg-slate-100 min-h-screen font-sans antialiased" x-data="ujianApp()" x-cloak>

    <div class="max-w-6xl mx-auto py-10 px-6">
        <!-- HEADER -->
        <div class="mb-8 flex flex-col md:flex-row justify-between items-end gap-4 border-b border-slate-300 pb-6">
            <div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight">GENERATOR NOMOR UJIAN</h1>
                <a href="https://about-wrwn.site/" target="_blank" class="text-slate-500 hover:text-blue-600 transition-colors uppercase text-xs font-bold tracking-widest mt-1 flex items-center gap-1.5">
                    WiraWebSolusi
                    <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>

                    CETAK PDF
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-sm font-black text-slate-400 uppercase tracking-widest mb-5">Konfigurasi Kode</h2>
                    <div class="space-y-4">
                        <div><label class="block text-xs font-bold text-slate-700 mb-1">Kode Rayon</label>
                            <input type="text" x-model="config.rayon" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg outline-none font-bold"></div>
                        <div><label class="block text-xs font-bold text-slate-700 mb-1">Kode Sub-Rayon</label>
                            <input type="text" x-model="config.subRayon" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg outline-none font-bold"></div>
                        <div><label class="block text-xs font-bold text-slate-700 mb-1">Kode Sekolah</label>
                            <input type="text" x-model="config.sekolah" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg outline-none font-bold"></div>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-sm font-black text-slate-400 uppercase tracking-widest mb-4">Import Data</h2>
                    <div class="relative group cursor-pointer">
                        <input type="file" @change="handleImport" accept=".xlsx, .xls" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                        <div class="border-2 border-dashed border-slate-200 rounded-xl p-8 text-center bg-slate-50 group-hover:border-blue-400 transition">
                            <span class="text-xs font-bold text-slate-500 uppercase">Klik Upload Excel</span>
                        </div>
                    </div>
                    <button @click="resetData" class="w-full mt-4 text-[10px] font-black text-red-400 uppercase tracking-tighter">Kosongkan Semua Data</button>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="max-h-[600px] overflow-y-auto custom-scroll">

    <script>
        function ujianApp() {
            return {
                config: Alpine.$persist({ rayon: '09', subRayon: '04', sekolah: '16' }).as('exam_cfg'),
                peserta: Alpine.$persist([]).as('exam_data'),
                generateNomor(urut) {
                    const r = String(this.config.rayon).padStart(2, '0');
                    const sr = String(this.config.subRayon).padStart(2, '0');
                    const sk = String(this.config.sekolah).padStart(2, '0');
                    const n = String(urut).padStart(3, '0');
                    return `${r}-${sr}-${sk}-${n}`;
                },
                handleImport(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (evt) => {
                        const data = evt.target.result;
                        const workbook = XLSX.read(data, { type: 'binary' });
                        const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                        this.peserta = rows.map(r => {
                            const namaKey = Object.keys(r).find(k => k.toLowerCase() === 'nama');
                            return { Nama: r[namaKey] || 'TIDAK ADA NAMA' };
                        }).filter(x => x.Nama !== 'TIDAK ADA NAMA');
                    };
                    reader.readAsBinaryString(file);
                    e.target.value = "";
                },
                resetData() { if(confirm('Hapus semua data peserta?')) this.peserta = []; },
                exportExcel() {
                    const wsData = [["DAFTAR NOMOR PESERTA UJIAN"], [`Rayon: ${this.config.rayon} | Sub-Rayon: ${this.config.subRayon} | Kode Sekolah: ${this.config.sekolah}`], [], ["N O", "NOMOR PESERTA", "NAMA LENGKAP"]];
                    this.peserta.forEach((p, i) => wsData.push([i + 1, this.generateNomor(i + 1), p.Nama.toUpperCase()]));
                    const ws = XLSX.utils.aoa_to_sheet(wsData);
                    ws['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 2 } }, { s: { r: 1, c: 0 }, e: { r: 1, c: 2 } }];
                    ws['A1'].s = { font: { bold: true, sz: 16 }, alignment: { horizontal: "center" } };
                    ws['A2'].s = { font: { sz: 10, color: { rgb: "666666" } }, alignment: { horizontal: "center" } };
                    const headerStyle = { fill: { fgColor: { rgb: "2D62ED" } }, font: { color: { rgb: "FFFFFF" }, bold: true }, alignment: { horizontal: "center", vertical: "center" }, border: { top: { style: "thin" }, bottom: { style: "thin" }, left: { style: "thin" }, right: { style: "thin" } } };
                    ['A4', 'B4', 'C4'].forEach(cell => { ws[cell].s = headerStyle; });
                    for (let i = 0; i < this.peserta.length; i++) {
                        const rIdx = i + 5;
                        ['A', 'B', 'C'].forEach(col => {
                            const cellRef = col + rIdx;
                            if(!ws[cellRef]) return;
                            ws[cellRef].s = { fill: { fgColor: { rgb: i % 2 === 1 ? "F2F6FF" : "FFFFFF" } }, alignment: { horizontal: col === 'C' ? "left" : "center" }, border: { top: { style: "thin", color: { rgb: "DDDDDD" } }, bottom: { style: "thin", color: { rgb: "DDDDDD" } }, left: { style: "thin", color: { rgb: "DDDDDD" } }, right: { style: "thin", color: { rgb: "DDDDDD" } }, font: col === 'B' ? { bold: true, name: 'Courier New' } : {} } };
                        });
                    }
                    ws['!cols'] = [{ wch: 6 }, { wch: 25 }, { wch: 45 }];
                    const wb = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(wb, ws, "Daftar Peserta");
                    XLSX.writeFile(wb, `Data_Ujian_${this.config.sekolah}.xlsx`);
                },
                exportPDF() {
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF('p', 'mm', 'a4');
                    const pageWidth = doc.internal.pageSize.getWidth();
                    doc.setFont("helvetica", "bold");
                    doc.setFontSize(18);
                    doc.text("DAFTAR NOMOR PESERTA UJIAN", pageWidth / 2, 18, { align: "center" });
                    doc.setFont("helvetica", "normal");
                    doc.setFontSize(10);
                    doc.setTextColor(100);
                    doc.text(`Rayon: ${this.config.rayon} | Sub-Rayon: ${this.config.subRayon} | Kode Sekolah: ${this.config.sekolah}`, pageWidth / 2, 25, { align: "center" });
                    doc.setDrawColor(200); doc.line(15, 30, pageWidth - 15, 30);
                    const bodyData = this.peserta.map((p, i) => [i + 1, this.generateNomor(i + 1), p.Nama.toUpperCase()]);
                    doc.autoTable({
                        startY: 35, head: [['N O', 'NOMOR PESERTA', 'NAMA LENGKAP']], body: bodyData, theme: 'grid',
                        headStyles: { fillColor: [45, 98, 237], textColor: 255, halign: 'center', fontSize: 10, fontStyle: 'bold', cellPadding: 4 },
                        bodyStyles: { fontSize: 9, cellPadding: 3, textColor: 50 },
                        columnStyles: { 0: { halign: 'center', cellWidth: 15 }, 1: { halign: 'center', cellWidth: 50, font: 'courier', fontStyle: 'bold' }, 2: { halign: 'left' } },
                        alternateRowStyles: { fillColor: [242, 246, 255] },
                        margin: { left: 15, right: 15 }
                    });
                    doc.save(`Nomor_Ujian_${this.config.sekolah}.pdf`);
                }
            }
        }
    </script>
